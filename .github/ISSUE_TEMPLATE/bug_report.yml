name: Bug Report
description: Report a bug or unexpected behavior in the Thalian platform
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out as much detail as you can.
        For security vulnerabilities, do **not** use this form — email security@thalian.ai instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the platform is affected?
      options:
        - Dashboard / Home
        - Findings
        - Identities
        - Applications
        - Devices
        - Integrations / Sync
        - Remediation
        - Reports
        - Compliance
        - Access Reviews
        - AI Chat / AI Brief
        - Settings
        - Billing / Plan
        - Other
    validations:
      required: true

  - type: input
    id: integration
    attributes:
      label: Affected integration (if applicable)
      placeholder: e.g. Okta, Google Workspace, Slack

  - type: dropdown
    id: plan
    attributes:
      label: Workspace plan
      options:
        - Free
        - Pro / Trial
        - Enterprise
        - Not sure
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: e.g. Chrome 123 on macOS 15

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, error messages, or anything else that might help.
