name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Thalian? We'd love to hear it. The more context you give, the more useful your request will be.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or gap this would address.
      placeholder: "I'm trying to... but currently I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see built or changed?
      placeholder: Describe your ideal solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or other approaches you've tried?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New integration
        - Existing integration improvement
        - Findings / Analysis rules
        - AI Chat / AI Brief
        - Remediation
        - Reports / Export
        - Compliance
        - Access Reviews
        - Identities / Devices / Applications
        - Dashboard
        - Settings / Admin
        - API / Webhooks
        - Other
    validations:
      required: true

  - type: dropdown
    id: plan
    attributes:
      label: Your workspace plan
      options:
        - Free
        - Pro / Trial
        - Enterprise
        - Not sure
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, examples from other tools, or anything else helpful.
